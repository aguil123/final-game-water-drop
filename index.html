<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Water Drop Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="game-wrapper">
        <h1 class="game-title">Water Drop</h1>
        <p class="game-tagline">Click to shoot down the bad drops! Use WASD to move.</p>
        <div class="score-panel">
            <div class="score">Score: <span id="score">0</span></div>
            <div class="timer">Time: <span id="time">30</span>s</div>
            <button id="start-btn">Start Game</button>
        </div>
        
        <div id="game-container">
            <img id="water-can" src="img/water-can-transparent.png" alt="Water Can">
        </div>
        <img id="cw-logo" src="img/cw_logo-horizontal.png" alt="Charity Water Logo">
    </div>
    
    <script src="script.js"></script>
</body>
</html>
