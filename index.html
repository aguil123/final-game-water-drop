<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Water Drop Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="game-wrapper">
        <h1 class="game-title">Water Drop</h1>
        <p class="game-tagline">Click to shoot down the bad drops! Use WASD to move.</p>
        <div class="level-selector">
            <label for="difficulty-select">Level:</label>
            <select id="difficulty-select" name="difficulty">
                <option value="easy">Easy</option>
                <option value="medium">Medium</option>
                <option value="hard">Hard</option>
            </select>
        </div>
        <div class="score-panel">
            <div class="score">Score: <span id="score">0</span></div>
            <div class="timer">Time: <span id="time">30</span></div>
            <button id="start-btn">Start Game</button>
        </div>
        
        <div id="game-container">
            <img id="water-can" src="img/water-can-transparent.png" alt="Water Can">
        </div>
        <img id="cw-logo" src="img/cw_logo-horizontal.png" alt="Charity Water Logo">

    <footer class="page-footer">
        <h2>Donate now</h2>
        <a href="https://www.charitywater.org/global-water-crisis" target="_blank" rel="noopener noreferrer">charity: water | Why Water? Learn About the Global Water Crisis</a>
        <a href="https://www.charitywater.org/?utm_source=bing&utm_medium=paid-ppc&utm_campaign=bof-spring-usrow&utm_term=MS_BOFU_Brand-PhraseExtended_PD_SRC_BRN_CVR_SPR_USA_MTD_V1&utm_content=branded&msclkid=03bb4af0d20819c2b53d20b88fcf9882" target="_blank" rel="noopener noreferrer">charity: water | Help Bring Clean and Safe Water to Communities</a>
    </footer>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
